<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatua del Yaqui</title>
    <style>
        /* Estilo moderno y oscuro para resaltar el modelo */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0a0a0a; 
            color: #ffffff; 
        }
        header { 
            background: #000000; 
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #d4af37; /* Color bronce/oro */
        }
        main { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .canvas-container { 
            width: 100%; 
            max-width: 1000px; 
            height: 65vh; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .info { 
            padding: 25px; 
            text-align: left; 
            max-width: 950px; 
            background: #161616; 
            margin-top: 25px; 
            border-radius: 12px; 
            border-left: 6px solid #d4af37;
        }
        h1 { font-size: 1.4rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .student-data { font-size: 0.95rem; color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>ESTATUA DEL YAQUI - INTERACTIVO</h1>
        <div class="student-data">
            
        </div>
    </header>

    <main>
        <div class="canvas-container">
            <!-- Usando el ID del enlace que me pasaste -->
            <iframe 
                title="Danza del Venado" 
                frameborder="0" 
                allowfullscreen 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true" 
                allow="autoplay; fullscreen; xr-spatial-tracking" 
                src="https://sketchfab.com/models/d65b88dec9b34e7ea7f2f8c957b7bad2/embed" 
                style="width: 100%; height: 100%;">
            </iframe>
        </div>
        
        <div class="info">
            <h3>Sobre la Danza del Venado</h3>
            <p>Esta es una representación digital interactiva del <strong>Danzante Yaqui</strong>. La danza es un ritual profundamente espiritual de los pueblos Yaqui y Mayo de Sonora, que simboliza la cacería del venado y la conexión sagrada con la naturaleza.</p>
        </div>
    </main>
</body>
</html>
